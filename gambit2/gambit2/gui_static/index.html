<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gambit | Honeypot Analyzer</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <!-- Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- Sidebar -->
        <aside id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-icon">⬢</span>
                    <h2>Gambit Analyzer</h2>
                </div>
                <p class="subtitle">Post-Incident Reports</p>
            </div>
            
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Search sessions...">
                <span class="search-icon">⌕</span>
            </div>

            <div id="logList" class="log-list">
                <!-- Log items will be dynamically injected here -->
                <div class="loading-state">Loading sessions...</div>
            </div>
            
            <div class="sidebar-footer">
                <button id="refreshBtn" class="action-btn">
                    <span>↻</span> Refresh Logs
                </button>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main id="mainContent">
            <header class="topbar">
                <div class="breadcrumb">
                    <span id="currentSelection">Select a session to view analysis</span>
                </div>
                <div class="topbar-actions">
                    <span class="status-badge" id="connStatus">● Connected</span>
                </div>
            </header>

            <div id="contentBody" class="content-body">
                <div class="placeholder-content">
                    <div class="placeholder-icon">⬡</div>
                    <h3>Waiting for selection</h3>
                    <p>Choose a session from the sidebar to load the forensic report.</p>
                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
